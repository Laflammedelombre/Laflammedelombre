<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Murmure - La Flamme de l'Ombre</title>
    <style>
        :root { --primary: #8B0000; --bg: #000; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        
        .container { text-align: center; width: 85%; max-width: 400px; }
        h1 { font-size: 1.2em; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; color: #fff; }

        /* Cercle de concentration */
        .trigger-zone { 
            position: relative; width: 120px; height: 120px; margin: auto; 
            border: 1px solid #333; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .flame-core { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 15px var(--primary); }
        
        #progress-ring {
            position: absolute; top: 0; left: 0; width: 120px; height: 120px;
            transform: rotate(-90deg);
        }
        #progress-ring circle {
            fill: transparent; stroke: var(--primary); stroke-width: 2;
            stroke-dasharray: 377; stroke-dashoffset: 377; transition: stroke-dashoffset 0.1s;
        }

        /* Message */
        #result { display: none; animation: fadeIn 1.5s; }
        #text { font-size: 1.4em; font-weight: 300; line-height: 1.5; margin-bottom: 40px; }
        .btn { color: var(--primary); text-decoration: none; border: 1px solid var(--primary); padding: 10px 20px; font-size: 0.8em; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container" id="main-ui">
    <h1>Posez votre question</h1>
    <div class="trigger-zone" id="btn">
        <svg id="progress-ring"><circle id="circle" cx="60" cy="60" r="58"></circle></svg>
        <div class="flame-core"></div>
    </div>
    <p id="hint" style="margin-top: 30px; color: #555; font-size: 0.8em;">Maintenez le centre</p>
</div>

<div class="container" id="result">
    <div id="text"></div>
    <a href="index.html" class="btn">APPROFONDIR AVEC UN TIRAGE</a>
</div>

<script>
    const messages = [
        "La réponse est oui.",
        "Ce n'est pas le bon moment.",
        "Lâchez prise sur ce détail.",
        "Faites confiance à votre instinct.",
        "Une surprise arrive.",
        "Prenez du recul.",
        "Agissez maintenant.",
        "Attendez encore un peu.",
        "Le danger est ailleurs.",
        "Vous avez déjà la solution.",
        "Osez dire non.",
        "Regardez la vérité en face.",
        "Changez de direction.",
        "La peur vous bloque.",
        "Tout va bien se passer.",
        "Restez discret.",
        "Parlez-en autour de vous.",
        "Écoutez votre intuition.",
        "Le passé revient.",
        "Une porte s'ouvre enfin."
    ];

    let timer;
    let offset = 377;
    const btn = document.getElementById('btn');
    const circle = document.getElementById('circle');

    function start() {
        timer = setInterval(() => {
            offset -= 5;
            circle.style.strokeDashoffset = offset;
            if (offset <= 0) {
                clearInterval(timer);
                showResult();
            }
        }, 30);
    }

    function stop() {
        clearInterval(timer);
        if (offset > 0) {
            offset = 377;
            circle.style.strokeDashoffset = offset;
        }
    }

    function showResult() {
        document.getElementById('main-ui').style.display = "none";
        document.getElementById('result').style.display = "block";
        document.getElementById('text').innerText = messages[Math.floor(Math.random() * messages.length)];
    }

    btn.addEventListener('mousedown', start);
    btn.addEventListener('touchstart', start);
    window.addEventListener('mouseup', stop);
    window.addEventListener('touchend', stop);
</script>
</body>
</html>
